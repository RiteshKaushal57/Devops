name: If demo
on:
  push:
    branches:
      - main
      - develop
jobs:
  demo:
    runs-on: ubuntu-latest
    steps:
      - name: Run this step if branch is main
        if: github.ref == 'refs/heads/main'
        run: echo "Running this for main step"
      - name: Run this step if branch is develop
        if: github.ref == 'refs/heads/develop'
        run: echo "Running this for develop step"