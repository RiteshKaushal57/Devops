# Passing the data from job to job
name: Outputs Demo for job to job data passing
on: push
jobs:
  build:
    outputs:
      version: ${{ steps.build_step.outputs.version }}
    runs-on: ubuntu-latest
    steps:
      - name: Build step
        id: build_step
        run: echo "version=0.0.1" >> $GITHUB_OUTPUT
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy the app
        run: echo "We are deploying the app with version ${{ needs.build.outputs.version }}" 